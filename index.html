<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="🎹 פסנתר">
<title>🎹 מעקב פסנתר</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
    font-family: 'Heebo', sans-serif;
    direction: rtl;
    color: white;
    padding-bottom: 90px;
    overscroll-behavior: none;
  }
  .fredoka { font-family: 'Fredoka One', cursive; }

/* Header */
.header {
background: rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
padding: 48px 20px 16px;
text-align: center;
border-bottom: 1px solid rgba(255,255,255,0.1);
position: sticky;
top: 0;
z-index: 10;
}
.header-label { font-size: 14px; opacity: 0.7; margin-bottom: 2px; }
.star-count { font-family: ‘Fredoka One’, cursive; font-size: 48px; line-height: 1; color: #FFD700; }
.avail-label { font-size: 13px; opacity: 0.55; margin-top: 4px; }
.progress-label { font-size: 12px; opacity: 0.6; margin: 10px 0 4px; }
.progress-bar { background: rgba(255,255,255,0.1); border-radius: 99px; height: 8px; overflow: hidden; }
.progress-fill {
height: 100%;
border-radius: 99px;
background: linear-gradient(90deg, #FFD700, #FF6B6B);
transition: width 0.6s ease;
}

/* Content */
.content { padding: 20px 16px; }

/* Cards */
.card {
background: rgba(255,255,255,0.07);
border-radius: 24px;
padding: 20px;
margin-bottom: 16px;
border: 1px solid rgba(255,255,255,0.1);
}
.card-title { font-weight: 700; font-size: 18px; margin-bottom: 16px; }

/* Type buttons */
.type-btns { display: flex; gap: 10px; margin-bottom: 16px; }
.type-btn {
flex: 1; padding: 12px 8px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.2);
background: rgba(255,255,255,0.05); color: white; cursor: pointer;
font-family: ‘Heebo’, sans-serif; font-weight: 700; font-size: 14px;
transition: all 0.2s; text-align: center;
}
.type-btn.active { border-color: #FFD700; background: rgba(255,215,0,0.15); }
.type-btn .sub { font-size: 11px; opacity: 0.7; margin-top: 3px; }

/* Stars */
.stars-row { display: flex; gap: 6px; margin-bottom: 16px; }
.star-btn { font-size: 30px; cursor: pointer; transition: transform 0.15s; background: none; border: none; padding: 0; }
.star-btn.on { transform: scale(1.15); }
.star-btn.off { filter: grayscale(1) opacity(0.3); }

/* Textarea / Input */
.note-input {
width: 100%; background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
padding: 10px 12px; color: white; font-size: 14px;
font-family: ‘Heebo’, sans-serif; resize: none; outline: none;
margin-bottom: 14px;
}
input.note-input { height: 44px; }
textarea.note-input { height: 70px; }

/* Save button */
.save-btn {
width: 100%;
background: linear-gradient(135deg, #FFD700, #FF6B6B);
border: none; border-radius: 16px; padding: 16px;
font-size: 18px; font-weight: 900; cursor: pointer; color: white;
font-family: ‘Fredoka One’, cursive;
box-shadow: 0 8px 24px rgba(255,107,107,0.4);
transition: transform 0.1s;
}
.save-btn:active { transform: scale(0.97); }

/* Weekly dots */
.week-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
.week-dot {
width: 46px; height: 46px; border-radius: 50%;
display: flex; align-items: center; justify-content: center; font-size: 20px;
transition: all 0.3s;
}
.week-dot.done { background: linear-gradient(135deg, #4ECDC4, #45B7D1); box-shadow: 0 4px 12px rgba(78,205,196,0.5); }
.week-dot.empty { background: rgba(255,255,255,0.1); }
.week-label { font-size: 14px; opacity: 0.8; margin-right: 4px; }

/* History items */
.entry-item {
background: rgba(255,255,255,0.07);
border-radius: 20px; padding: 14px 16px; margin-bottom: 12px;
border: 1px solid rgba(255,255,255,0.1);
display: flex; align-items: center; gap: 14px;
}
.entry-icon {
width: 50px; height: 50px; border-radius: 16px; flex-shrink: 0;
display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.entry-icon.lesson { background: linear-gradient(135deg, #667eea, #764ba2); }
.entry-icon.practice { background: linear-gradient(135deg, #f093fb, #f5576c); }
.entry-info { flex: 1; }
.entry-name { font-weight: 700; font-size: 15px; }
.entry-stars-sm { display: flex; gap: 2px; margin-top: 3px; }
.entry-note { font-size: 13px; opacity: 0.6; margin-top: 4px; }
.entry-date { font-size: 12px; opacity: 0.5; margin-top: 3px; }
.entry-earned { text-align: center; flex-shrink: 0; }
.entry-earned .num { font-size: 22px; font-weight: 900; color: #FFD700; font-family: ‘Fredoka One’, cursive; }
.entry-bonus { font-size: 10px; color: #4ECDC4; margin-top: 2px; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-card {
background: rgba(255,255,255,0.07); border-radius: 20px; padding: 16px;
border: 1px solid rgba(255,255,255,0.1); text-align: center;
}
.stat-icon { font-size: 28px; margin-bottom: 4px; }
.stat-value { font-weight: 900; font-size: 26px; font-family: ‘Fredoka One’, cursive; color: #FFD700; }
.stat-label { font-size: 12px; opacity: 0.6; margin-top: 3px; }

/* Milestones */
.milestone-item {
border-radius: 16px; padding: 12px 16px; margin-bottom: 10px;
display: flex; align-items: center; gap: 12;
}
.milestone-item.done { background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.4); }
.milestone-item.locked { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
.milestone-bar { background: rgba(255,255,255,0.1); border-radius: 99px; height: 6px; margin-top: 6px; }
.milestone-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #FFD700, #FF6B6B); }

/* Prizes */
.prize-item {
border-radius: 20px; padding: 14px 16px; margin-bottom: 12px;
display: flex; align-items: center; gap: 12px;
}
.prize-item.available { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); }
.prize-item.redeemed { background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.3); }
.prize-name { font-weight: 700; font-size: 15px; }
.prize-cost { font-size: 13px; color: #FFD700; margin-top: 3px; }
.redeem-btn {
border: none; border-radius: 12px; padding: 8px 14px;
color: white; font-size: 13px; font-weight: 700; cursor: pointer;
font-family: ‘Heebo’, sans-serif;
}
.redeem-btn.can { background: linear-gradient(135deg, #FFD700, #FF6B6B); }
.redeem-btn.cant { background: rgba(255,255,255,0.1); cursor: not-allowed; }
.del-btn { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 18px; padding: 4px; }

/* Bottom nav */
.bottom-nav {
position: fixed; bottom: 0; left: 0; right: 0;
background: rgba(15,12,41,0.96);
backdrop-filter: blur(20px);
border-top: 1px solid rgba(255,255,255,0.1);
display: flex; padding: 8px 0 24px;
z-index: 20;
}
.nav-btn {
flex: 1; background: none; border: none; cursor: pointer;
font-family: ‘Heebo’, sans-serif; font-size: 11px;
padding: 6px 4px; transition: all 0.2s; color: rgba(255,255,255,0.4);
}
.nav-btn.active { color: #FFD700; font-weight: 700; }
.nav-icon { font-size: 22px; margin-bottom: 2px; }

/* Confetti */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 1000; overflow: hidden; }
.confetti-piece {
position: absolute;
top: -12px;
border-radius: 50%;
animation: confettiFall 2.2s ease-in forwards;
}
@keyframes confettiFall {
to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Milestone popup */
.overlay {
position: fixed; inset: 0; background: rgba(0,0,0,0.6);
display: flex; align-items: center; justify-content: center;
z-index: 999; animation: fadeIn 0.3s ease;
}
.popup {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
border-radius: 32px; padding: 40px 48px; text-align: center;
color: white; max-width: 320px; width: 90%;
box-shadow: 0 30px 80px rgba(0,0,0,0.4);
animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.popup-icon { font-size: 72px; margin-bottom: 8px; }
.popup-title { font-family: ‘Fredoka One’, cursive; font-size: 28px; margin-bottom: 8px; }
.popup-msg { font-size: 18px; opacity: 0.9; margin-bottom: 8px; }
.popup-sub { font-size: 14px; opacity: 0.8; margin-bottom: 24px; }
.popup-btn {
background: white; color: #764ba2; border: none;
border-radius: 50px; padding: 12px 32px; font-size: 16px;
font-weight: 700; cursor: pointer; font-family: ‘Heebo’, sans-serif;
}
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes popIn { from { transform: scale(0.5); opacity:0 } to { transform: scale(1); opacity:1 } }

.empty-state { text-align: center; opacity: 0.45; padding: 40px 20px; font-size: 16px; line-height: 1.8; }

/* Add prize row */
.add-prize-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.num-input {
width: 70px; background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
padding: 8px 10px; color: white; font-size: 14px;
font-family: ‘Heebo’, sans-serif; outline: none;
}
.add-btn {
background: linear-gradient(135deg, #4ECDC4, #45B7D1);
border: none; border-radius: 12px; padding: 10px 20px;
color: white; font-size: 14px; font-weight: 700;
cursor: pointer; font-family: ‘Heebo’, sans-serif;
}

.section-title { font-weight: 700; font-size: 20px; margin-bottom: 16px; }
.section-subtitle { font-weight: 700; font-size: 16px; margin-bottom: 12px; }

.milestone-row { display: flex; align-items: center; gap: 12px; }
.milestone-icon { font-size: 28px; flex-shrink: 0; }
.milestone-info { flex: 1; }
.milestone-name { font-weight: 700; }
.milestone-status { font-size: 13px; font-weight: 700; flex-shrink: 0; }
</style>

</head>
<body>

<!-- Confetti container -->

<div class="confetti-wrap" id="confettiWrap"></div>

<!-- Milestone popup -->

<div class="overlay" id="milestoneOverlay" style="display:none">
  <div class="popup">
    <div class="popup-icon">🏆</div>
    <div class="popup-title">מדהים!</div>
    <div class="popup-msg" id="popupMsg"></div>
    <div class="popup-sub">מגיע לך פרס! 🎁</div>
    <button class="popup-btn" onclick="closePopup()">יאיייי! 🎉</button>
  </div>
</div>

<!-- Header -->

<div class="header">
  <div class="header-label">🎹 מעקב פסנתר</div>
  <div class="star-count fredoka" id="totalStars">0 ⭐</div>
  <div class="avail-label" id="availStars">זמין: 0 ⭐</div>
  <div id="progressSection">
    <div class="progress-label" id="progressLabel"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<!-- Content -->

<div class="content" id="content"></div>

<!-- Bottom nav -->

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab(0)" id="tab0">
    <div class="nav-icon">🏠</div>בית
  </button>
  <button class="nav-btn" onclick="switchTab(1)" id="tab1">
    <div class="nav-icon">📅</div>יומן
  </button>
  <button class="nav-btn" onclick="switchTab(2)" id="tab2">
    <div class="nav-icon">📊</div>התקדמות
  </button>
  <button class="nav-btn" onclick="switchTab(3)" id="tab3">
    <div class="nav-icon">🎁</div>פרסים
  </button>
</div>

<script>
const MILESTONES = [50, 100, 200, 500, 1000];
const WEEKLY_GOAL = 3;
let currentTab = 0;

function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let entries = load('piano_entries', []);
let prizes = load('piano_prizes', []);
let logType = 'practice';
let selectedStars = 3;

function totalStars() { return entries.reduce((s, e) => s + e.stars, 0); }
function redeemedStars() { return prizes.filter(p => p.redeemed).reduce((s, p) => s + p.cost, 0); }
function availableStars() { return totalStars() - redeemedStars(); }

function getWeeklyPractices() {
  const now = new Date();
  const start = new Date(now); start.setDate(now.getDate() - now.getDay()); start.setHours(0,0,0,0);
  return entries.filter(e => e.type === 'practice' && new Date(e.date) >= start).length;
}

function updateHeader() {
  const total = totalStars();
  const avail = availableStars();
  document.getElementById('totalStars').textContent = total + ' ⭐';
  document.getElementById('availStars').textContent = 'זמין: ' + avail + ' ⭐';
  const next = MILESTONES.find(m => m > total);
  if (next) {
    const pct = Math.min((total / next) * 100, 100);
    document.getElementById('progressLabel').textContent = 'עוד ' + (next - total) + ' כוכבים עד המטרה הבאה (' + next + ' ⭐)';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressSection').style.display = 'block';
  } else {
    document.getElementById('progressSection').style.display = 'none';
  }
}

function switchTab(n) {
  currentTab = n;
  for (let i = 0; i < 4; i++) {
    document.getElementById('tab' + i).classList.toggle('active', i === n);
  }
  render();
}

function render() {
  updateHeader();
  const c = document.getElementById('content');
  if (currentTab === 0) c.innerHTML = renderHome();
  if (currentTab === 1) c.innerHTML = renderHistory();
  if (currentTab === 2) c.innerHTML = renderProgress();
  if (currentTab === 3) c.innerHTML = renderPrizes();
  attachEvents();
}

function renderHome() {
  const weeklyCount = getWeeklyPractices();
  const starsHtml = [1,2,3,4,5].map(s =>
    `<button class="star-btn ${s <= selectedStars ? 'on' : 'off'}" onclick="setStar(${s})">⭐</button>`
  ).join('');
  const dotsHtml = Array.from({length: WEEKLY_GOAL}, (_,i) =>
    `<div class="week-dot ${i < weeklyCount ? 'done' : 'empty'}">${i < weeklyCount ? '✅' : '🎵'}</div>`
  ).join('');

  return `
    <div class="card">
      <div class="card-title">📝 תיעוד חדש</div>
      <div class="type-btns">
        <button class="type-btn ${logType==='practice'?'active':''}" onclick="setType('practice')">
          🎵 תרגול בית<div class="sub">⭐ לפי כוכביות</div>
        </button>
        <button class="type-btn ${logType==='lesson'?'active':''}" onclick="setType('lesson')">
          🎓 שיעור<div class="sub">15 ⭐</div>
        </button>
      </div>
      ${logType==='practice' ? `
        <div style="margin-bottom:8px;font-size:14px;opacity:0.7">כמה כוכבים מגיע לתרגול הזה?</div>
        <div class="stars-row">${starsHtml}</div>
      ` : ''}
      <textarea class="note-input" id="noteInput" placeholder="הערה (אופציונלי)..."></textarea>

```
  <button class="save-btn" onclick="logEntry()">🎉 שמור וקבל כוכבים!</button>
</div>
<div class="card">
  <div class="card-title">📅 יעד שבועי</div>
  <div class="week-row">
    ${dotsHtml}
    <div class="week-label">${weeklyCount}/${WEEKLY_GOAL} תרגולים${weeklyCount>=WEEKLY_GOAL?' 🎊 +10 ⭐':''}</div>
  </div>
</div>
```

`;
}

function renderHistory() {
if (!entries.length) return `<div class="section-title">📅 היסטוריה</div><div class="empty-state">עוד אין פעילויות.<br>התחל לתעד! 🎹</div>`;
const items = entries.map(e => {
const starsHtml = e.displayStars
? [1,2,3,4,5].map(s=>`<span style="font-size:16px;${s<=e.displayStars?'':'filter:grayscale(1) opacity(0.3)'}">⭐</span>`).join(’’)
: ‘’;
const d = new Date(e.date);
const dateStr = d.toLocaleDateString(‘he-IL’, {weekday:‘long’, day:‘numeric’, month:‘long’});
return `<div class="entry-item"> <div class="entry-icon ${e.type}">${e.type==='lesson'?'🎓':'🎵'}</div> <div class="entry-info"> <div class="entry-name">${e.type==='lesson'?'שיעור עם המורה':'תרגול בית'}</div> ${starsHtml ?`<div class="entry-stars-sm">${starsHtml}</div>`: ''} ${e.note ?`<div class="entry-note">${e.note}</div>`: ''} <div class="entry-date">${dateStr}</div> </div> <div class="entry-earned"> <div class="num">+${e.stars}</div> <div style="font-size:12px">⭐</div> ${e.bonusMsg ?`<div class="entry-bonus">${e.bonusMsg}</div>`: ''} </div> </div>`;
}).join(’’);
return `<div class="section-title">📅 היסטוריה</div>${items}`;
}

function renderProgress() {
const total = totalStars();
const lessons = entries.filter(e=>e.type===‘lesson’).length;
const practices = entries.filter(e=>e.type===‘practice’).length;
const weekly = getWeeklyPractices();
const stats = [
{icon:‘⭐’, val:total, label:‘סה״כ כוכבים’},
{icon:‘🎓’, val:lessons, label:‘שיעורים’},
{icon:‘🎵’, val:practices, label:‘תרגולים’},
{icon:‘🎯’, val:`${weekly}/${WEEKLY_GOAL}`, label:‘יעד שבועי’},
];
const statsHtml = stats.map(s=>`<div class="stat-card"> <div class="stat-icon">${s.icon}</div> <div class="stat-value fredoka">${s.val}</div> <div class="stat-label">${s.label}</div> </div>`).join(’’);
const msHtml = MILESTONES.map(m => {
const done = total >= m;
const pct = Math.min((total/m)*100,100);
return ` <div class="milestone-item ${done?'done':'locked'}"> <div class="milestone-row" style="width:100%"> <div class="milestone-icon">${done?'🏆':'🔒'}</div> <div class="milestone-info"> <div class="milestone-name">${m} כוכבים</div> <div class="milestone-bar"><div class="milestone-fill" style="width:${pct}%"></div></div> </div> <div class="milestone-status" style="color:${done?'#FFD700':'rgba(255,255,255,0.4)'}">${done?'✅':`${total}/${m}`}</div> </div> </div> `;
}).join(’’);
return `<div class="section-title">📊 התקדמות</div> <div class="stats-grid">${statsHtml}</div> <div class="section-subtitle">🏆 מיילסטונים</div> ${msHtml}`;
}

function renderPrizes() {
const avail = availableStars();
const prizeItems = prizes.map(p => `<div class="prize-item ${p.redeemed?'redeemed':'available'}"> <div style="font-size:28px">${p.redeemed?'✅':'🎁'}</div> <div style="flex:1"> <div class="prize-name" style="${p.redeemed?'text-decoration:line-through;opacity:0.5':''}">${p.name}</div> <div class="prize-cost">${p.cost} ⭐</div> </div> ${!p.redeemed ?`<button class="redeem-btn ${avail>=p.cost?'can':'cant'}" onclick="redeemPrize(${p.id})">${avail>=p.cost?‘מימוש!’:‘נעול’}</button>`: ''} <button class="del-btn" onclick="deletePrize(${p.id})">✕</button> </div>`).join(’’);

return `<div class="section-title">🎁 חנות פרסים</div> <div style="font-size:13px;opacity:0.6;margin-bottom:16px">יש לך ${avail} ⭐ זמינים</div> <div class="card"> <div class="card-title">➕ הוסף פרס</div> <input class="note-input" id="prizeNameInput" placeholder="שם הפרס (למשל: גלידה 🍦)"> <div class="add-prize-row"> <div style="font-size:14px;opacity:0.7">עלות:</div> <input type="number" class="num-input" id="prizeCostInput" value="50"> <div>⭐</div> </div> <button class="add-btn" onclick="addPrize()">הוסף פרס</button> </div> ${prizes.length ? prizeItems : '<div class="empty-state">הוסף פרסים שהבן שלך יכול לממש! 🎁</div>'}`;
}

function attachEvents() {}

function setType(t) { logType = t; render(); }
function setStar(n) { selectedStars = n; render(); }

function logEntry() {
const noteEl = document.getElementById(‘noteInput’);
const note = noteEl ? noteEl.value : ‘’;
const weeklyBefore = getWeeklyPractices();
let earned = logType === ‘lesson’ ? 15 : selectedStars;
let bonusMsg = ‘’;
if (logType === ‘practice’ && weeklyBefore + 1 === WEEKLY_GOAL) {
earned += 10; bonusMsg = ‘+10 בונוס שבועי!’;
}
const prevTotal = totalStars();
const entry = {
id: Date.now(), type: logType, stars: earned,
date: new Date().toISOString(), note,
bonusMsg, displayStars: logType===‘practice’ ? selectedStars : null
};
entries.unshift(entry);
save(‘piano_entries’, entries);
checkMilestone(prevTotal, totalStars());
showConfetti();
render();
}

function checkMilestone(prev, next) {
for (const m of MILESTONES) {
if (prev < m && next >= m) {
setTimeout(() => showMilestone(‘הגעת ל־’ + m + ’ כוכבים!’), 600);
return;
}
}
}

function showMilestone(msg) {
document.getElementById(‘popupMsg’).textContent = msg;
document.getElementById(‘milestoneOverlay’).style.display = ‘flex’;
showConfetti();
}
function closePopup() {
document.getElementById(‘milestoneOverlay’).style.display = ‘none’;
}

function showConfetti() {
const wrap = document.getElementById(‘confettiWrap’);
wrap.innerHTML = ‘’;
const colors = [’#FFD700’,’#FF6B6B’,’#4ECDC4’,’#45B7D1’,’#96CEB4’,’#FFEAA7’,’#f093fb’];
for (let i = 0; i < 45; i++) {
const el = document.createElement(‘div’);
el.className = ‘confetti-piece’;
el.style.cssText = `left:${Math.random()*100}%; width:${8+Math.random()*10}px; height:${8+Math.random()*10}px; background:${colors[Math.floor(Math.random()*colors.length)]}; animation-delay:${Math.random()*0.6}s; animation-duration:${1.8+Math.random()*0.8}s;`;
wrap.appendChild(el);
}
setTimeout(() => { wrap.innerHTML = ‘’; }, 3000);
}

function addPrize() {
const name = document.getElementById(‘prizeNameInput’).value.trim();
const cost = parseInt(document.getElementById(‘prizeCostInput’).value) || 50;
if (!name) return;
prizes.push({ id: Date.now(), name, cost, redeemed: false });
save(‘piano_prizes’, prizes);
render();
}

function redeemPrize(id) {
const p = prizes.find(p => p.id === id);
if (!p || availableStars() < p.cost) return;
p.redeemed = true;
save(‘piano_prizes’, prizes);
showConfetti();
render();
}

function deletePrize(id) {
prizes = prizes.filter(p => p.id !== id);
save(‘piano_prizes’, prizes);
render();
}

// Init
render();
</script>
